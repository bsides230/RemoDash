<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services Manager</title>
    <link rel="stylesheet" href="../../assets/base.css">
    <script src="../../assets/theme-client.js"></script>
    <style>
        body { padding: 20px; font-family: var(--font-family, sans-serif); color: var(--text-body); background: var(--bg-core); }
        .service-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .service-card { background: var(--bg-panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .service-info { display: flex; flex-direction: column; gap: 4px; }
        .service-name { font-weight: bold; font-size: 1.1em; color: var(--text-heading); }
        .service-status { font-size: 0.9em; padding: 2px 6px; border-radius: 4px; width: fit-content; text-transform: uppercase; font-weight: bold; }
        .status-active { background: rgba(16, 185, 129, 0.2); color: #10B981; }
        .status-inactive { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
        .status-unknown { background: rgba(107, 114, 128, 0.2); color: #9CA3AF; }

        .service-actions { display: flex; gap: 5px; }
        .btn { padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--text-body); cursor: pointer; transition: 0.2s; font-size: 0.9em; }
        .btn:hover { background: var(--brand-color); color: #fff; border-color: var(--brand-color); }
        .btn-remove { border-color: rgba(239, 68, 68, 0.3); color: #EF4444; }
        .btn-remove:hover { background: #EF4444; color: #fff; border-color: #EF4444; }

        .add-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px; background: rgba(0,0,0,0.2); color: var(--text-body); }
        .add-input:focus { outline: none; border-color: var(--brand-color); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--text-heading); font-size: 1.5em; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Services Manager</h1>
        <button class="btn" onclick="fetchServices()">Refresh</button>
    </div>

    <div class="add-form">
        <input type="text" id="new-service-name" class="add-input" placeholder="e.g., nginx.service, docker.service">
        <button class="btn" onclick="addService()">Add Service</button>
    </div>

    <div id="service-list" class="service-list">
        <!-- Service cards will be injected here -->
    </div>

    <script>
        const API_BASE = '/api/services';
        let authToken = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('lyrn-auth-token');

        async function apiCall(endpoint, method = 'GET', body = null) {
            const headers = { 'X-Token': authToken };
            if (body) headers['Content-Type'] = 'application/json';
            const res = await fetch(API_BASE + endpoint, {
                method, headers,
                body: body ? JSON.stringify(body) : null
            });
            if (!res.ok) {
                const text = await res.text();
                throw new Error(text || res.statusText);
            }
            return res.json();
        }

        async function fetchServices() {
            try {
                const services = await apiCall('/list');
                renderServices(services);
            } catch (err) {
                console.error("Error fetching services", err);
            }
        }

        function getStatusClass(status) {
            if (status === 'active') return 'status-active';
            if (status === 'inactive' || status === 'failed') return 'status-inactive';
            return 'status-unknown';
        }

        function renderServices(services) {
            const container = document.getElementById('service-list');
            container.innerHTML = '';

            if (services.length === 0) {
                container.innerHTML = '<div style="opacity:0.5; text-align:center;">No services added.</div>';
                return;
            }

            services.forEach(s => {
                const card = document.createElement('div');
                card.className = 'service-card';

                const statusHtml = s.status ? `<span class="service-status ${getStatusClass(s.status)}">${s.status}</span>` : '';

                card.innerHTML = `
                    <div class="service-info">
                        <span class="service-name">${s.name}</span>
                        ${statusHtml}
                    </div>
                    <div class="service-actions">
                        <button class="btn" onclick="serviceAction('${s.name}', 'start')">▶ Start</button>
                        <button class="btn" onclick="serviceAction('${s.name}', 'stop')">■ Stop</button>
                        <button class="btn" onclick="serviceAction('${s.name}', 'restart')">↻ Restart</button>
                        <button class="btn btn-remove" onclick="removeService('${s.name}')">✖ Remove</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function addService() {
            const input = document.getElementById('new-service-name');
            const name = input.value.trim();
            if (!name) return;
            try {
                await apiCall('/add', 'POST', { name });
                input.value = '';
                fetchServices();
            } catch (err) {
                alert("Failed to add service: " + err.message);
            }
        }

        async function removeService(name) {
            if (!confirm(`Remove ${name} from list?`)) return;
            try {
                await apiCall('/remove', 'POST', { name });
                fetchServices();
            } catch (err) {
                alert("Failed to remove service: " + err.message);
            }
        }

        async function serviceAction(name, action) {
            try {
                await apiCall('/action', 'POST', { name, action });
                // Small delay to let systemd update state
                setTimeout(fetchServices, 1000);
            } catch (err) {
                alert(`Failed to ${action} ${name}: ` + err.message);
            }
        }

        // Initialize
        fetchServices();
    </script>
</body>
</html>
